{% extends "base.html" %}
{% block title %}{{ code }} - {% endblock %}

{% block content %}

<div class="error-wrap">
    <div class="card">
        <div class="code">{{ code }}</div>
        <div class="text">{{ text }}</div>

        <a href="/" class="home">← Back home</a>
    </div>
</div>

<style>
    .error-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
        width: 100%;
    }

    .card {
        padding: 40px 50px;
        border-radius: 42px;
        text-align: center;
        max-width: 500px;
        width: 100%;
    }

    .code {
        font-size: 90px;
        font-weight: 800;
        color: #2f3b1f;
        line-height: 1;
    }

    .text {
        font-size: 18px;
        margin-top: 10px;
        opacity: 0.7;
        font-weight: 500;
    }

    .home {
        display: inline-block;
        margin-top: 25px;
        text-decoration: none;
        color: black;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 12px;
        background: #A2CB8B;
        transition: 0.2s;
    }

    .home:hover {
        opacity: 0.7;
    }
</style>

{% endblock %}
